<style>
  :root {
    --primary: #ff385c;
    --primary-active: #e00b41;
    --primary-disabled: #ffd1da;
    --error: #c13515;
    --ink: #222222;
    --body: #3f3f3f;
    --muted: #6a6a6a;
    --muted-soft: #929292;
    --hairline: #dddddd;
    --hairline-soft: #ebebeb;
    --border-strong: #c1c1c1;
    --canvas: #ffffff;
    --surface-soft: #f7f7f7;
    --surface-strong: #f2f2f2;
    --success: #008a05;
    --warning: #b26a00;
    --radius-button: 8px;
    --radius-card: 14px;
    --radius-panel: 14px;
    --radius-pill: 9999px;
    --shadow-float: rgba(0, 0, 0, 0.02) 0 0 0 1px, rgba(0, 0, 0, 0.04) 0 2px 6px 0, rgba(0, 0, 0, 0.1) 0 4px 8px 0;
    --font: 'Airbnb Cereal VF', Circular, -apple-system, BlinkMacSystemFont, system-ui, Roboto, 'Helvetica Neue', 'Noto Sans KR', sans-serif;
  }

  * { box-sizing: border-box; }

  html { background: var(--canvas); }

  body {
    margin: 0;
    font-family: var(--font);
    color: var(--ink);
    background: var(--canvas);
    letter-spacing: 0;
  }

  .topbar {
    position: sticky;
    top: 0;
    z-index: 10;
    min-height: 80px;
    padding: 14px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    color: var(--ink);
    background: rgba(255, 255, 255, .98);
    border-bottom: 1px solid var(--hairline);
    backdrop-filter: blur(12px);
  }

  .admin-topbar { background: rgba(255, 255, 255, .98); }

  .eyebrow {
    margin: 0 0 4px;
    color: var(--primary);
    font-size: 12px;
    font-weight: 700;
    line-height: 1.33;
  }

  h1, h2, h3, p { margin-top: 0; }

  h1 {
    margin-bottom: 0;
    font-size: 22px;
    font-weight: 500;
    line-height: 1.18;
    letter-spacing: 0;
  }

  h2 {
    margin-bottom: 6px;
    font-size: 21px;
    font-weight: 700;
    line-height: 1.43;
    letter-spacing: 0;
  }

  h3 {
    margin: 0 0 8px;
    font-size: 16px;
    font-weight: 600;
    line-height: 1.25;
    letter-spacing: 0;
  }

  p {
    color: var(--body);
    line-height: 1.5;
  }

  .admin-link,
  button,
  select,
  input,
  textarea { font: inherit; }

  .admin-link {
    display: inline-flex;
    min-height: 40px;
    align-items: center;
    justify-content: center;
    color: var(--ink);
    text-decoration: none;
    border: 1px solid var(--hairline);
    border-radius: var(--radius-pill);
    padding: 8px 16px;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.29;
    white-space: nowrap;
    background: var(--canvas);
  }

  .admin-link:hover { box-shadow: var(--shadow-float); }

  .layout {
    width: min(100% - 32px, 1280px);
    margin: 24px auto 64px;
  }

  .panel {
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-panel);
    padding: 20px;
  }

  .intro-panel {
    display: grid;
    gap: 16px;
    margin-bottom: 24px;
  }

  .intro-panel p,
  .section-heading span,
  .message {
    color: var(--muted);
    font-size: 14px;
    font-weight: 400;
    line-height: 1.43;
  }

  .section-heading {
    display: grid;
    gap: 4px;
    margin-bottom: 16px;
  }

  .section-heading.with-actions {
    display: grid;
    gap: 16px;
  }

  .promotion-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 16px;
    margin: 0 0 24px;
  }

  .promotion-card {
    overflow: hidden;
    min-height: 100%;
    display: grid;
    grid-template-rows: auto 1fr;
    background: var(--canvas);
    border: 1px solid transparent;
    border-radius: var(--radius-card);
    cursor: pointer;
    transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease;
  }

  .promotion-card:hover,
  .promotion-card.selected {
    transform: translateY(-2px);
    border-color: var(--hairline);
    box-shadow: var(--shadow-float);
  }

  .promotion-card.selected {
    border-color: var(--ink);
    outline: 2px solid var(--primary);
    outline-offset: 2px;
  }

  .promotion-card img {
    width: 100%;
    aspect-ratio: 1 / 1;
    object-fit: cover;
    background: var(--hairline-soft);
    border-radius: var(--radius-card);
  }

  .promotion-card .card-body {
    display: grid;
    gap: 8px;
    padding: 14px 2px 0;
  }

  .promotion-card .card-copy {
    display: -webkit-box;
    min-height: 40px;
    overflow: hidden;
    color: var(--muted);
    font-size: 14px;
    line-height: 1.43;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }

  .card-shell { padding: 12px 0 0; }

  .card-kicker,
  .card-foot {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.23;
  }

  .card-price {
    color: var(--ink);
    font-size: 14px;
    font-weight: 600;
    line-height: 1.43;
  }

  .card-cta {
    justify-self: start;
    color: var(--primary-active);
    font-size: 14px;
    font-weight: 500;
    line-height: 1.43;
  }

  .badge {
    width: fit-content;
    padding: 4px 10px;
    border-radius: var(--radius-pill);
    font-size: 11px;
    font-weight: 600;
    line-height: 1.18;
    background: var(--canvas);
    color: var(--ink);
    box-shadow: var(--shadow-float);
  }

  .two-column {
    display: grid;
    grid-template-columns: 1fr;
    gap: 24px;
    align-items: start;
  }

  label {
    display: grid;
    gap: 8px;
    margin-bottom: 16px;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.29;
  }

  input,
  textarea,
  select {
    width: 100%;
    border: 1px solid var(--hairline);
    border-radius: var(--radius-button);
    padding: 14px 12px;
    color: var(--ink);
    background: var(--canvas);
    font-size: 16px;
    font-weight: 400;
    line-height: 1.5;
  }

  input:focus,
  textarea:focus,
  select:focus {
    outline: 0;
    border: 2px solid var(--ink);
    padding: 13px 11px;
  }

  textarea { resize: vertical; }

  button {
    min-height: 48px;
    border: 0;
    border-radius: var(--radius-button);
    padding: 14px 24px;
    font-size: 16px;
    font-weight: 500;
    line-height: 1.25;
    cursor: pointer;
  }

  button:disabled {
    color: var(--canvas);
    cursor: not-allowed;
    background: var(--primary-disabled);
  }

  .primary-button {
    color: var(--canvas);
    background: var(--primary);
  }

  .primary-button:hover { background: var(--primary-active); }

  .secondary-button {
    color: var(--ink);
    background: var(--canvas);
    border: 1px solid var(--ink);
  }

  .ghost-button {
    color: var(--ink);
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-pill);
  }

  .lookup-form,
  .login-form {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
    align-items: end;
  }

  .lookup-form label,
  .login-form label { margin-bottom: 0; }

  .table-wrap {
    overflow-x: auto;
    margin-top: 16px;
    border-top: 1px solid var(--hairline-soft);
    border-bottom: 1px solid var(--hairline-soft);
  }

  table {
    width: 100%;
    min-width: 680px;
    border-collapse: collapse;
    background: var(--canvas);
  }

  th, td {
    padding: 14px 12px;
    border-bottom: 1px solid var(--hairline-soft);
    text-align: left;
    vertical-align: top;
  }

  th {
    color: var(--muted);
    font-size: 13px;
    font-weight: 400;
    line-height: 1.23;
    background: var(--canvas);
  }

  tr:last-child td { border-bottom: 0; }

  .result-summary {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 16px;
    font-weight: 500;
  }

  .result-summary span {
    padding: 8px 12px;
    border: 1px solid var(--hairline);
    border-radius: var(--radius-pill);
    background: var(--canvas);
  }

  .hidden { display: none !important; }

  .login-panel { max-width: 520px; margin: 0 auto; }

  .admin-app {
    display: grid;
    gap: 24px;
  }

  .stats-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .stat-card {
    min-height: 118px;
    display: grid;
    align-content: space-between;
    gap: 12px;
    background: var(--canvas);
    border: 1px solid var(--hairline);
    border-radius: var(--radius-card);
    padding: 16px;
  }

  .stat-card:hover { box-shadow: var(--shadow-float); }

  .stat-card span {
    color: var(--muted);
    font-size: 14px;
    font-weight: 500;
    line-height: 1.29;
  }

  .stat-card strong {
    display: block;
    color: var(--ink);
    font-size: 28px;
    font-weight: 700;
    line-height: 1.43;
  }

  .stat-card small {
    color: var(--muted);
    font-size: 13px;
    font-weight: 400;
    line-height: 1.23;
  }

  .stat-card.kpi-total { border-color: var(--primary-disabled); }
  .stat-card.kpi-pending { background: var(--surface-soft); }
  .stat-card.kpi-approved { border-color: #cfeedd; }
  .stat-card.kpi-rejected { border-color: #ffd6cc; }
  .stat-card.kpi-duplicate { border-color: #ffe2a8; }

  .review-list { display: grid; gap: 16px; }

  .review-item {
    border: 1px solid var(--hairline);
    border-radius: var(--radius-card);
    padding: 16px;
    background: var(--canvas);
  }

  .review-item:hover { box-shadow: var(--shadow-float); }

  .review-head,
  .review-actions {
    display: grid;
    gap: 12px;
  }

  .review-meta {
    display: flex;
    flex-wrap: wrap;
    gap: 8px 12px;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.23;
  }

  .review-actions { margin-top: 16px; }

  .status-인정 { color: var(--success); font-weight: 600; }
  .status-반려 { color: var(--error); font-weight: 600; }
  .status-중복의심 { color: var(--warning); font-weight: 600; }
  .status-확인대기, .status-접수 { color: var(--primary-active); font-weight: 600; }

  @media (min-width: 744px) {
    .topbar { padding: 18px 32px; }
    h1 { font-size: 28px; font-weight: 700; line-height: 1.43; }
    .layout { width: min(100% - 48px, 1280px); }
    .intro-panel,
    .section-heading.with-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .promotion-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .lookup-form { grid-template-columns: 1fr 1fr auto; }
    .login-form { grid-template-columns: 1fr auto; }
    .stats-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); }
    .review-head,
    .review-actions {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .review-actions input { flex: 1; }
  }

  @media (min-width: 960px) {
    .promotion-grid { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .two-column { grid-template-columns: minmax(300px, 420px) 1fr; }
  }

  @media (min-width: 1128px) {
    .promotion-grid { grid-template-columns: repeat(5, minmax(0, 1fr)); }
  }
</style>
